<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test QR Menu Fixes</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/responsive.css" rel="stylesheet">
  </head>
  <body>
    <!-- Test QR Code Printing -->
    <div id="qrModal" class="modal fade" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="qrModalLabel">QR Code Generator</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <button class="btn btn-outline-primary me-2" id="singleQrBtn">Single Table QR Code</button>
              <button class="btn btn-outline-primary" id="multipleQrBtn">All Tables QR Codes</button>
            </div>
            <div id="qrContent">
              <!-- QR code content will be inserted here -->
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" id="printQrBtn">Print QR Codes</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Test Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalLabel">Product Name</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="product-modal-image" id="productModalImage"></div>
            <div class="product-modal-details">
              <h3 id="productModalName"></h3>
              <p class="product-category" id="productModalCategory"></p>
              <p class="product-description" id="productModalDescription"></p>
              <div class="ingredients-section">
                <h6>Ingrédients:</h6>
                <p id="productModalIngredients"></p>
              </div>
              <div class="price-availability">
                <div class="price-section">
                  <span class="price-label">Prix:</span>
                  <span class="price-value" id="productModalPrice"></span>
                </div>
                <div class="availability-badge" id="productModalAvailability"></div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
            <button type="button" class="btn btn-primary" id="addToOrderBtn">Ajouter à la commande</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
      // Test data
      const testProduct = {
        id: 1,
        name: { fr: "Tacos Poulet", ar: "تاكوس الدجاج", en: "Chicken Tacos" },
        price: 900,
        category: "Tacos",
        image: "assets/products/tacos-chicken.svg",
        available: true,
        ingredients: {
          fr: "Poulet grillé, fromage cheddar, laitue, tomate, oignon, frites",
          ar: "دجاج مشوي, جبنة شيدر, خس, طماطم, بصل, بطاطا مقلية",
          en: "Grilled chicken, cheddar cheese, lettuce, tomato, onion, fries"
        }
      };

      let currentLanguage = 'fr';

      // Translation functions
      function getProductTranslation(field) {
        if (!field || typeof field !== 'object') return field || '';
        return field[currentLanguage] || field.fr || Object.values(field)[0] || '';
      }

      function getCategoryTranslation(field) {
        if (!field || typeof field !== 'object') return field || '';
        return field[currentLanguage] || field.fr || Object.values(field)[0] || '';
      }

      function getTranslation(key) {
        const translations = {
          fr: {
            "welcome": "Bienvenue chez Club des Pins",
            "hero_description": "Découvrez notre délicieux menu préparé avec passion",
            "open_now": "Ouvert maintenant",
            "search_placeholder": "Chercher un produit...",
            "price_range": "Gamme de Prix:",
            "no_results": "Aucun produit trouvé",
            "ingredients": "Ingrédients:",
            "price": "Prix:",
            "add_to_order": "Ajouter à la commande",
            "close": "Fermer",
            "all_rights": "Tous droits réservés",
            "restaurant_name": "Club des Pins",
            "restaurant_slogan": "Fresh Bread • Sandwiches • Fast Food",
            "all_categories": "Tous",
            "available": "Disponible",
            "unavailable": "Indisponible"
          },
          ar: {
            "welcome": "مرحبا بكم في نادي الصنوبر",
            "hero_description": "اكتشف قائمتنا اللذيذة المعدة بحب",
            "open_now": "مفتوح الآن",
            "search_placeholder": "ابحث عن منتج...",
            "price_range": "نطاق السعر:",
            "no_results": "لم يتم العثور على أي منتج",
            "ingredients": "المكونات:",
            "price": "السعر:",
            "add_to_order": "إضافة إلى الطلب",
            "close": "إغلاق",
            "all_rights": "جميع الحقوق محفوظة",
            "restaurant_name": "نادي الصنوبر",
            "restaurant_slogan": "خبز طازج • سندويتشات • وجبات سريعة",
            "all_categories": "الكل",
            "available": "متوفر",
            "unavailable": "غير متوفر"
          },
          en: {
            "welcome": "Welcome to Pine Club",
            "hero_description": "Discover our delicious menu prepared with passion",
            "open_now": "Open now",
            "search_placeholder": "Search for a product...",
            "price_range": "Price Range:",
            "no_results": "No products found",
            "ingredients": "Ingredients:",
            "price": "Price:",
            "add_to_order": "Add to order",
            "close": "Close",
            "all_rights": "All rights reserved",
            "restaurant_name": "Pine Club",
            "restaurant_slogan": "Fresh Bread • Sandwiches • Fast Food",
            "all_categories": "All",
            "available": "Available",
            "unavailable": "Unavailable"
          }
        };

        return translations[currentLanguage] && translations[currentLanguage][key]
          ? translations[currentLanguage][key]
          : key;
      }

      // Order functions
      function getOrders() {
        const orders = localStorage.getItem('testOrders');
        return orders ? JSON.parse(orders) : [];
      }

      function saveOrder(product) {
        const orders = getOrders();
        const existingOrderIndex = orders.findIndex(order => order.productId === product.id);

        if (existingOrderIndex >= 0) {
          orders[existingOrderIndex].quantity += 1;
        } else {
          orders.push({
            productId: product.id,
            name: getProductTranslation(product.name),
            price: product.price,
            quantity: 1,
            category: product.category,
            image: product.image,
            timestamp: new Date().toISOString()
          });
        }

        localStorage.setItem('testOrders', JSON.stringify(orders));
        showOrderConfirmation();
      }

      function showOrderConfirmation() {
        // Remove existing toast
        const existingToast = document.getElementById('testOrderToast');
        if (existingToast) {
          existingToast.remove();
        }

        const toast = document.createElement('div');
        toast.id = 'testOrderToast';
        toast.className = 'position-fixed bottom-0 end-0 p-3';
        toast.style.zIndex = '1060';
        document.body.appendChild(toast);

        toast.innerHTML = `
          <div class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body">
                Produit ajouté à la commande!
              </div>
              <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
          </div>
        `;

        const bootstrapToast = new bootstrap.Toast(toast);
        bootstrapToast.show();
      }

      // Open product modal
      function openProductModal(product) {
        const modalTitle = document.getElementById('productModalLabel');
        const modalImage = document.getElementById('productModalImage');
        const modalName = document.getElementById('productModalName');
        const modalCategory = document.getElementById('productModalCategory');
        const modalDescription = document.getElementById('productModalDescription');
        const modalIngredients = document.getElementById('productModalIngredients');
        const modalPrice = document.getElementById('productModalPrice');
        const modalAvailability = document.getElementById('productModalAvailability');

        // Set modal content
        modalTitle.textContent = getProductTranslation(product.name);
        modalTitle.dataset.productId = product.id;
        modalImage.innerHTML = `<img src="${product.image}" alt="${getProductTranslation(product.name)}" onerror="this.onerror=null; this.innerHTML='<i class=\"fas fa-utensils\"></i>'; this.style.fontSize='40px'; this.style.color='white';">`;
        modalName.textContent = getProductTranslation(product.name);
        modalCategory.textContent = getCategoryTranslation({ name: { fr: product.category } });
        modalDescription.textContent = getProductTranslation(product.description);
        modalIngredients.textContent = getProductTranslation(product.ingredients);
        modalPrice.textContent = `${product.price} DA`;
        modalAvailability.textContent = product.available ? getTranslation('available') : getTranslation('unavailable');
        modalAvailability.className = `availability-badge ${product.available ? 'available' : 'unavailable'}`;

        // Show modal
        const productModal = new bootstrap.Modal(document.getElementById('productModal'));
        productModal.show();
      }

      // QR functions
      function showSingleQrCode() {
        const qrContent = document.getElementById('qrContent');
        qrContent.innerHTML = '';

        const currentUrl = window.location.href;
        const qrImg = document.createElement('img');
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}`;
        qrImg.alt = 'QR Code for current page';
        qrImg.style.display = 'block';
        qrImg.style.margin = '0 auto';

        const qrInfo = document.createElement('p');
        qrInfo.className = 'text-center mt-3';
        qrInfo.textContent = currentUrl;

        qrContent.appendChild(qrImg);
        qrContent.appendChild(qrInfo);
      }

      function showMultipleQrCodes() {
        const qrContent = document.getElementById('qrContent');
        qrContent.innerHTML = '';

        const baseUrl = window.location.href.split('?')[0];
        const tableCount = 5; // Just 5 for test
        const qrGrid = document.createElement('div');
        qrGrid.className = 'qr-grid';
        qrGrid.style.display = 'grid';
        qrGrid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(120px, 1fr))';
        qrGrid.style.gap = '15px';
        qrGrid.style.marginBottom = '20px';

        for (let i = 1; i <= tableCount; i++) {
          const tableUrl = `${baseUrl}?table=${i}`;

          const qrItem = document.createElement('div');
          qrItem.style.textAlign = 'center';

          const qrImg = document.createElement('img');
          qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(tableUrl)}`;
          qrImg.alt = `QR Code for table ${i}`;
          qrImg.style.width = '100px';
          qrImg.style.height = '100px';
          qrImg.style.border = '1px solid #ddd';
          qrImg.style.borderRadius = '4px';

          const tableLabel = document.createElement('div');
          tableLabel.className = 'mt-2';
          tableLabel.style.fontSize = '14px';
          tableLabel.style.fontWeight = 'bold';
          tableLabel.textContent = `Table ${i}`;

          qrItem.appendChild(qrImg);
          qrItem.appendChild(tableLabel);
          qrGrid.appendChild(qrItem);
        }

        const instructions = document.createElement('p');
        instructions.className = 'text-center mb-3';
        instructions.innerHTML = `<strong>Tip:</strong> Select landscape orientation for better fit when printing.`;

        qrContent.appendChild(instructions);
        qrContent.appendChild(qrGrid);
      }

      // Event listeners
      document.addEventListener('DOMContentLoaded', function() {
        // QR buttons
        document.querySelector('#singleQrBtn')?.addEventListener('click', showSingleQrCode);
        document.querySelector('#multipleQrBtn')?.addEventListener('click', showMultipleQrCodes);
        document.querySelector('#printQrBtn')?.addEventListener('click', () => window.print());

        // Add to order button
        document.querySelector('#addToOrderBtn')?.addEventListener('click', function() {
          const modalProductId = document.getElementById('productModalLabel').dataset.productId;
          if (modalProductId) {
            saveOrder(testProduct);
          }
        });

        // Auto-open modals for testing
        setTimeout(() => {
          openProductModal(testProduct);
        }, 1000);
      });
    </script>

    <style>
      /* Print styles for testing */
      @media print {
        body * {
          visibility: hidden !important;
        }
        #qrContent,
        #qrContent * {
          visibility: visible !important;
        }
        #qrContent {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: 100% !important;
          margin: 0 !important;
          padding: 20px !important;
        }
        #qrModal,
        #qrModal .modal-dialog,
        #qrModal .modal-content {
          background: transparent !important;
          box-shadow: none !important;
        }
        .qr-grid img {
          width: 150px !important;
          height: 150px !important;
        }
        .qr-grid {
          gap: 20px !important;
          justify-content: center !important;
          align-items: start !important;
        }
      }

      /* Make sure images load */
      img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </body>
</html>
